<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Gadgets Demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
        background: #eef7f6;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 56px 20px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 5vw, 54px);
        line-height: 1;
      }
      p {
        max-width: 650px;
        color: #475569;
        font-size: 18px;
        line-height: 1.6;
      }
      .demo-product {
        margin-top: 32px;
        max-width: 380px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        padding: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Urban Gadgets Demo</h1>
      <p>
        Electronics storefront demo. Try: "Do you have warranty?" or "Is COD available?"
      </p>
      <section class="demo-product">
        <strong>MagSafe Power Bank 10K</strong>
        <p>Fast charging accessory with warranty-backed support.</p>
      </section>
    </main>
    <script src="./widget.js" data-brand-id="urban-demo" data-api-url="http://localhost:5000"></script>
  </body>
</html>
