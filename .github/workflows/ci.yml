name: Widget CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: node --check widget.js
      - name: Reject localhost production embeds
        run: |
          if grep -R 'data-api-url="http://localhost' --include='*.html' .; then
            echo "::error::A demo page still references a localhost backend"
            exit 1
          fi
